<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Activity Dashboard</title>
    <link rel="stylesheet" href="./css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" type="image/x-icon" href="./assets/image/icons/fevicon.png">
</head>
<body>
    <div class="page-bg"></div>

    <header class="topbar">
        <a href="index.html" class="back-link">Back</a>
        <h1>GitHub Profile Dashboard</h1>
    </header>

    <main class="dashboard-wrap">
        <section class="dashboard">
            <div class="left-panel">
                <div class="card profile">
                    <img id="avatar" alt="avatar">
                    <h2 id="name"></h2>
                    <p id="username"></p>
                    <p id="bio"></p>
                    <div class="stats">
                        <div class="stat">
                            <h3 id="repo"></h3>
                            <p>Repositories</p>
                        </div>

                        <div class="stat">
                            <h3 id="followers"></h3>
                            <p>Followers</p>
                        </div>

                        <div class="stat">
                            <h3 id="following"></h3>
                            <p>Following</p>
                        </div>
                    </div>
                </div>

                <div class="card repo">repo</div>
            </div>

            <div class="right-panel">
                <div class="card languages">
                    <h3>Languages Used</h3>
                    <div id="language-list"></div>
                </div>

                <div class="card commits">
                    <h3>Commits Over Time</h3>
                    <p id="commit-status" class="commit-status"></p>
                    <div class="chart-container">
                        <canvas id="commitChart"></canvas>
                    </div>
                </div>

                <div class="card contribution">
                    <h3>Contribution Activity</h3>
                    <div id="heatmap"></div>
                     <!-- Streak / Stats Card -->
    <div class="streak-card card">
        <div class="streak-header">
            <h1 id="total">0</h1>
            <p>contributions this week</p>
        </div>

        <hr>

        <div class="stats-row">
            <div>
                ⭐ <span id="stars">0</span>
                <p>Stars</p>
            </div>

            <div>
                🍴 <span id="forks">0</span>
                <p>Forks</p>
            </div>
        </div>
    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="./js/dashboard.js"></script>
</body>
</html>
