<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>result</title>
    <link rel="stylesheet" href="result.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <h1>git hub profile</h1>
    <main class="dashboard">
        <div class="left-panell">
            <div class="profile">
                <img id="avatar" alt="avatar" width="100">
                <h2 id="name"></h2>
                <p id="username"></p>
                <p id="bio"></p>
                <div class="stats">
                    <div class="stat">
                        <h3 id="repo"></h3>
                        <p>Repositories</p>
                    </div>

                    <div class="stat">
                        <h3 id="followers"></h3>
                        <p>Followers</p>
                    </div>

                    <div class="stat">
                        <h3 id="following"></h3>
                        <p>Following</p>
                    </div>
                </div>
            </div>
            <div class="repo">repo</div>
        </div>
        <div class="right-panel">
            <div class="languages">
                <h3>Languages Used</h3>
                <div id="language-list"></div>
            </div>
            <div class="commits">
                <h3>Commits Over Time</h3>
                <div class="chart-container">
                    <canvas id="commitChart"></canvas>
                </div>
            </div>
            <div class="contribution">
                <h3>Contribution Activity</h3>
                <div id="heatmap"></div>
            </div>
    </main>
    <script src="result.js"></script>
</body>

</html>
