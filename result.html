<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>result</title>
    <link rel="stylesheet" href="result.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <h1>git hub profile</h1>
    <main class="dashboard">
        <div class="left-panell">
            <div class="profile">
                <img id="avatar" alt="avatar" width="100">
                <h2 id="name"></h2>
                <p id="username"></p>
                <p id="bio"></p>
                <div class="stats">
                    <div><strong id="repo"></strong><span>Repositories</span></div>
                    <div><strong id="followers"></strong><span>Followers</span></div>
                    <div><strong id="following"></strong><span>Following</span></div>
                </div>
            </div>
            <div class="repo">repo</div>
        </div>
        <div class="right-panel">
            <div class="languages">
                <h3>Languages Used</h3>
                <div id="language-list"></div>
            </div>
            <div class="commits">
                <h3>Commits Over Time</h3>
                <canvas id="commitChart"></canvas>
            </div>
            <div class="contribution">
                <h3>Contribution Activity</h3>
                <div id="heatmap"></div>
            </div>
    </main>
    <script src="result.js"></script>
</body>

</html>
