<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>git-hub-visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
            <div class="logo">
                <img src="" alt="hello" srcset="">
                <span>git-hub-visualizer</span>
            </div>
            <nav class="nav">
                <ul class="links">
                    <li><a href="#">feature</a></li>
                    <li><a href="#">preview</a></li>
                </ul>
                <button>Get Started</button>
            </nav>
    </header>
    <main class="main">
        <div class="container">
            <div class="left">
                <h1 class="main_head">Visualize your GitHub activity and contributions</h1>
                <p class="main_para">
                    gain insights into your coding habits. <br>
                    enter your github username and see all <br>
                    activities in a beautiful,interactive charts
                </p>
                <input type="text" id="input" placeholder="Enter your GitHub username">
                <button id="search-btn">search</button>
            </div>
            <div class="right">
                <img src="" alt="image" srcset="">
            </div>
        </div>
    </main>
  
       <script src="script.js"></script>

</html>
